name: Build, Push & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Nach dem Build deployen?"
        required: false
        type: boolean
        default: true
      instances:
        description: "Instanzen updaten (kommagetrennt, z.B. kunde1,kunde2). Leer = alle."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Read version from package.json
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ env.NEW_VERSION }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}

  deploy:
    needs: build-and-push
    if: ${{ github.event.inputs.deploy != 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            INSTANCES_INPUT="${{ github.event.inputs.instances }}"
            INSTANCES_DIR="$HOME/instances"

            if [ -n "$INSTANCES_INPUT" ]; then
              IFS=',' read -ra TARGETS <<< "$INSTANCES_INPUT"
            else
              TARGETS=()
              for dir in "$INSTANCES_DIR"/*/; do
                [ -f "$dir/docker-compose.yml" ] && TARGETS+=("$(basename "$dir")")
              done
            fi

            for INSTANCE in "${TARGETS[@]}"; do
              DIR="$INSTANCES_DIR/$INSTANCE"
              if [ ! -f "$DIR/docker-compose.yml" ]; then
                echo "⚠ Instanz '$INSTANCE' nicht gefunden, übersprungen."
                continue
              fi
              echo "→ Update $INSTANCE ..."
              cd "$DIR"
              docker compose pull
              docker compose up -d --force-recreate
            done

            docker image prune -f
